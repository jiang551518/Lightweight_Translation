mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

proxies:
  - name: "🇺🇸 美国 (RN)"
    type: hysteria2
    server: 107.174.83.102
    port: 32639
    password: d071a2a4
    sni: www.bing.com
    skip-cert-verify: true
    download-bandwidth: 1000
    upload-bandwidth: 1000

  - name: "🇭🇰 香港 (JH)"
    type: hysteria2
    server: 38.55.122.156
    port: 29397
    password: 1851b487
    sni: www.bing.com
    skip-cert-verify: true
    download-bandwidth: 1000
    upload-bandwidth: 1000

proxy-groups:
  - name: 自动选择
    type: url-test
    proxies:
      - "🇭🇰 香港 (JH)"
      - "🇺🇸 美国 (RN)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 手动选择
    type: select
    proxies:
      - 自动选择
      - "🇭🇰 香港 (JH)"
      - "🇺🇸 美国 (RN)"

rules:
  - MATCH,手动选择